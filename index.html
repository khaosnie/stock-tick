// ═══ 绘制背驰段矩形 ═══
function drawDivergenceSegments(chart, segments, candles) {
  // 清除旧图元
  if (segmentPrimitive) {
    try { chart.panes()[0].detachPrimitive(segmentPrimitive); } catch(e) {}
    segmentPrimitive = null;
  }
  if (!segments || !segments.length || !candles || !candles.length) return;

  // 计算每个段的最高/最低价
  var segRects = [];
  for (var si = 0; si < segments.length; si++) {
    var s = segments[si];
    var hi = -Infinity, lo = Infinity;
    for (var k = 0; k < candles.length; k++) {
      var ct = candles[k].time;
      if (ct >= s.t1 && ct <= s.t2) {
        if (candles[k].high > hi) hi = candles[k].high;
        if (candles[k].low < lo) lo = candles[k].low;
      }
    }
    if (hi > -Infinity) segRects.push({ t1: s.t1, t2: s.t2, hi: hi, lo: lo, color: s.c1 });
  }
  if (!segRects.length) return;

  segmentPrimitive = {
    _segs: segRects,
    requestUpdate: function() {},
    attached: function(r) { this._r = r; },
    detached: function() {},
    draw: function(target) {
      var self = this;
      target.useMediaCoordSpace(function(scope) {
        var ctx2 = scope.context;
        for (var i = 0; i < self._segs.length; i++) {
          var sr = self._segs[i];
          var x1 = scope.timeToMedia(sr.t1);
          var x2 = scope.timeToMedia(sr.t2);
          var yLo = scope.priceToMedia(sr.hi);
          var yHi = scope.priceToMedia(sr.lo);
          if (x1 < 0 || x2 < 0 || yLo < 0 || yHi < 0) continue;
          ctx2.fillStyle = sr.color;
          ctx2.fillRect(Math.min(x1, x2), Math.min(yLo, yHi), Math.abs(x2 - x1), Math.abs(yHi - yLo));
        }
      });
    }
  };
  try { chart.panes()[0].attachPrimitive(segmentPrimitive); } catch(e) {}
}

function detectMinuteSignals(r, idx) {
  const PREV_CLOSE = CONFIG.prevClose || 1;
  const m = r.mins[idx];
  const tags = [];
  const prev = idx > 0 ? r.mins[idx-1] : null;
  const prev2 = idx > 1 ? r.mins[idx-2] : null;
  const prev3 = idx > 2 ? r.mins[idx-3] : null;

  if (!prev) return tags;

  const chg1 = (m.price - prev.price) / prev.price;
  const histVols = r.mins.slice(Math.max(0, idx-8), idx).map(function(x){return x.vol;});
  const avgVol = histVols.length ? histVols.reduce(function(a,b){return a+b;},0) / histVols.length : m.vol;
  var isTail = r.mins.length > 0 && idx >= r.mins.length - 20;

  // ═══ 脉冲拉升 / 脉冲下砸 ═══
  if (avgVol > 0 && m.vol > avgVol * 2.5) {
    if (chg1 > 0.02) tags.push({ label: '脉冲拉升+' + (chg1*100).toFixed(1) + '%', cls: 'pump' });
    else if (chg1 < -0.02) tags.push({ label: '脉冲下砸' + (chg1*100).toFixed(1) + '%', cls: 'dump' });
    else if (m.vol > avgVol * 3) tags.push({ label: '爆量×' + (m.vol/avgVol).toFixed(0), cls: 'pump' });
    else tags.push({ label: '放量×' + (m.vol/avgVol).toFixed(1), cls: 'info' });
  } else if (avgVol > 0 && m.vol > avgVol * 3) {
    tags.push({ label: '爆量×' + (m.vol/avgVol).toFixed(0), cls: 'pump' });
  } else if (avgVol > 0 && m.vol > avgVol * 2) {
    tags.push({ label: '放量×' + (m.vol/avgVol).toFixed(1), cls: 'info' });
  }

  // ═══ 尾盘动向（按实际时间：14:40 以后） ═══
  var tmParts = m.time.split(':');
  var tmH = parseInt(tmParts[0]);
  var tmM = parseInt(tmParts[1]);
  var isTail = tmH >= 15 || (tmH === 14 && tmM >= 40);
  if (isTail && avgVol > 0 && m.vol > avgVol * 2) {
    var tailDir = chg1 > 0.003 ? '买入' : chg1 < -0.003 ? '卖出' : '换手';
    tags.push({ label: '尾盘' + tailDir + '×' + (m.vol/avgVol).toFixed(1), cls: 'warn' });
  }

  // ═══ 急拉急跌（低量版，无脉冲确认） ═══
  var hasPulse = tags.some(function(t){return t.label.indexOf('脉冲') >= 0;});
  if (!hasPulse) {
    if (chg1 > 0.03) tags.push({ label: '急拉+' + (chg1*100).toFixed(1) + '%', cls: 'pump' });
    else if (chg1 > 0.015) tags.push({ label: '拉升+' + (chg1*100).toFixed(1) + '%', cls: 'pump' });
    else if (chg1 < -0.03) tags.push({ label: '急跌' + (chg1*100).toFixed(1) + '%', cls: 'dump' });
    else if (chg1 < -0.015) tags.push({ label: '下砸' + (chg1*100).toFixed(1) + '%', cls: 'dump' });
  }

  if (idx >= 2 && m.vol < prev.vol * 0.5 && prev.vol < prev2.vol * 0.8)
    tags.push({ label: '缩量止跌', cls: 'shrink' });

  if (prev2 && prev && (prev.price - prev2.price) / prev2.price > 0.015 && chg1 < -0.01)
    tags.push({ label: '诱多回吐', cls: 'trap' });

  if (r.vwap > 0) {
    if (prev.price < r.vwap && m.price > r.vwap) tags.push({ label: '上穿VWAP', cls: 'vwap' });
    else if (prev.price > r.vwap && m.price < r.vwap) tags.push({ label: '下穿VWAP', cls: 'vwap' });
  }

  const levels = CONFIG.defaultSR;
  if (levels.length) {
    for (const l of levels) {
      if (!l.v) continue;
      if (prev.price > l.v && m.price <= l.v) tags.push({ label: '跌破' + l.v, cls: 'level' });
      else if (prev.price < l.v && m.price >= l.v) tags.push({ label: '突破' + l.v, cls: 'level' });
    }
  }

  if (idx > 2) {
    const prevMax = Math.max(...r.mins.slice(0, idx).map(x => x.price));
    const prevMin = Math.min(...r.mins.slice(0, idx).map(x => x.price));
    if (m.price > prevMax) tags.push({ label: '日内新高', cls: 'hilo' });
    if (m.price < prevMin) tags.push({ label: '日内新低', cls: 'hilo' });
  }

  if (prev2 && prev && prev.price < prev2.price && prev2.price < prev3?.price && chg1 > 0.01)
    tags.push({ label: 'V反', cls: 'pump' });

  if (idx >= 3) {
    const d1 = m.price > prev.price, d2 = prev.price > prev2.price, d3 = prev2.price > prev3.price;
    if (d1 && d2 && d3) tags.push({ label: '3连阳', cls: 'pump' });
    if (!d1 && !d2 && !d3) tags.push({ label: '3连阴', cls: 'dump' });
  }

  if (prev.price > PREV_CLOSE && m.price <= PREV_CLOSE) tags.push({ label: '破昨收', cls: 'warn' });
  if (prev.price < PREV_CLOSE && m.price >= PREV_CLOSE) tags.push({ label: '收复昨收', cls: 'pump' });

  return tags.slice(0, 3);
}

// ═══ 信号日志 ═══
function buildSignalLog(r) {
  var entries = [];
  var PREV_CLOSE = CONFIG.prevClose || 1;

  // 1. 分钟级信号（取信号发生时刻的真实分钟数据）
  for (var i = 0; i < r.mins.length; i++) {
    var tags = detectMinuteSignals(r, i);
    for (var t = 0; t < tags.length; t++) {
      var explain = buildMinuteExplain(tags[t].label, tags[t].cls, r, i);
      entries.push({ time: r.mins[i].time, icon: '📍', signal: tags[t].label, explain: explain, conf: '' });
    }
  }

  // 2. 实时信号（r.sigs）
  if (r.sigs && r.sigs.length) {
    for (var si = 0; si < r.sigs.length; si++) {
      var s = r.sigs[si];
      var explain = buildSigExplain(s.text, s.sub, s.icon, r);
      if (explain) entries.push({ time: getLatestTime(r.mins), icon: s.icon, signal: s.text, explain: explain, conf: s.conf || '' });
    }
  }

  // 3. 洞察信号
  if (r.insights && r.insights.length) {
    for (var ii = 0; ii < r.insights.length; ii++) {
      var ins = r.insights[ii];
      var confTag = ins.conf === 'low' ? ' ⚪仅供参考' : ins.conf === 'high' ? ' 🔴高置信' : '';
      var skipTypes = { '盘面综述':1, 'VWAP上方强势(日内)':1, '站稳VWAP(日内)':1, 'VWAP下方承压(日内)':1, 'VWAP压制(日内)':1 };
      if (skipTypes[ins.title]) continue;
      var explain = ins.desc || '';
      // 吸筹信号从title解析时间
      var accMatch = ins.title.match(/吸筹\[.+?，(\d+:\d+)-(\d+:\d+)\]/);
      var entryTime = accMatch ? accMatch[1] : getLatestTime(r.mins);
      entries.push({ time: entryTime, icon: ins.icon, signal: ins.title, explain: explain, conf: confTag });
    }
  }

  // 4. 按时间倒序
  entries.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });

  return entries.slice(0, 10);
}

function getLatestTime(mins) {
  if (!mins || !mins.length) return '--:--';
  return mins[mins.length - 1].time;
}

// ═══ 分钟级信号解释（含实际值 vs 门限） ═══
function buildMinuteExplain(label, cls, r, idx) {
  var m = r.mins[idx];
  var prev = idx > 0 ? r.mins[idx-1] : null;
  var PREV_CLOSE = CONFIG.prevClose || 1;
  var p = m.price || 0, v = m.vol || 0, pv = prev ? prev.price : p;
  var chg = prev ? ((p - pv) / pv * 100) : 0;

  // 量比计算
  var histVols = r.mins.slice(Math.max(0, idx-8), idx).map(function(x){return x.vol;});
  var avgVol = histVols.length ? histVols.reduce(function(a,b){return a+b;},0) / histVols.length : v;
  var volRatio = avgVol > 0 ? (v / avgVol).toFixed(1) : '?';

  if (label.indexOf('脉冲拉升') === 0) {
    return '[量比:' + volRatio + '×(≥2.5倍门限)|涨幅:' + chg.toFixed(1) + '%(≥2%门限)|价:' + p.toFixed(0) + ']→单分钟放量急涨，主力主动买入概率高';
  }
  if (label.indexOf('脉冲下砸') === 0) {
    return '[量比:' + volRatio + '×(≥2.5倍门限)|跌幅:' + Math.abs(chg).toFixed(1) + '%(≥2%门限)|价:' + p.toFixed(0) + ']→单分钟放量急跌，主力主动卖出概率高';
  }
  if (label.indexOf('爆量') === 0 || label.indexOf('放量') === 0) {
    var th = label.indexOf('爆量') === 0 ? '≥3倍' : '≥2倍';
    return '[量比:' + volRatio + '×(' + th + '门限)' + (chg ? '|涨跌:' + (chg>=0?'+':'') + chg.toFixed(1) + '%' : '') + ']→放量异动，多空分歧加剧';
  }
  if (label.indexOf('尾盘') === 0) {
    return '[尾盘14:40后|量比:' + volRatio + '×(≥2倍门限)|涨跌:' + (chg>=0?'+':'') + chg.toFixed(2) + '%]→尾盘放量操作，机构调仓信号';
  }
  if (label.indexOf('急拉') === 0 || label.indexOf('拉升') === 0) {
    return '[涨幅:' + (parseFloat(label.match(/[\d.]+/)?.[0]||0)).toFixed(1) + '%(≥1.5%门限)|量比:' + volRatio + '×]→快速拉升，关注后续是否带量及回吐';
  }
  if (label.indexOf('急跌') === 0 || label.indexOf('下砸') === 0) {
    return '[跌幅:' + (parseFloat(label.match(/[\d.]+/)?.[0]||0)).toFixed(1) + '%(≥1.5%门限)|量比:' + volRatio + '×]→快速下砸，关注是否缩量止跌';
  }
  if (label.indexOf('缩量止跌') === 0) {
    var pv2 = idx > 1 ? r.mins[idx-2] : null;
    return '[连续缩量:' + (r.mins[idx-1]?r.mins[idx-1].vol:0) + '→' + v + '|跌速放缓]→抛压衰竭，若持续缩量+止跌，反弹概率提升';
  }
  if (label.indexOf('诱多') === 0) {
    var prev2 = idx > 1 ? r.mins[idx-2] : null;
    var pp = prev2 ? prev2.price : pv;
    return '[前分钟涨≥1.5%→当前跌≥1%|价:' + p.toFixed(0) + '|量:' + (v/1e4).toFixed(1) + '万]→拉升后快速回吐，疑似主力出货';
  }
  if (label.indexOf('VWAP') >= 0) {
    return '[穿越VWAP:' + (r.vwap||0).toFixed(0) + '|价:' + p.toFixed(0) + ']→日内均价关键位，突破后方向确认概率高';
  }
  if (label.indexOf('突破') === 0 || label.indexOf('跌破') === 0) {
    return '[关键价位穿越:' + label + ']→支撑/压力位突破，方向性信号';
  }
  if (label.indexOf('日内新高') === 0) {
    return '[价:' + p.toFixed(0) + '|超越当日所有前高价]→创日内新高，多头动能充沛';
  }
  if (label.indexOf('日内新低') === 0) {
    return '[价:' + p.toFixed(0) + '|跌破当日所有前低价]→创日内新低，空头压力未消';
  }
  if (label.indexOf('V反') === 0) {
    return '[形态:低→次低→高|涨:' + (chg>=0?'+':'') + chg.toFixed(1) + '%]→V型反转形态，若带量确认则反转概率高';
  }
  if (label.indexOf('3连阳') === 0) {
    return '[连续3根阳线|量:近3分钟' + (v/1e4).toFixed(1) + '万]→短线多头连贯，关注是否放量加速';
  }
  if (label.indexOf('3连阴') === 0) {
    return '[连续3根阴线|量:近3分钟' + (v/1e4).toFixed(1) + '万]→短线空头连贯，关注是否缩量止跌';
  }
  if (label.indexOf('破昨收') === 0) {
    return '[价:' + p.toFixed(0) + '|昨收:' + PREV_CLOSE.toFixed(0) + ']→跌破昨收，日内由多转空信号';
  }
  if (label.indexOf('收复昨收') === 0) {
    return '[价:' + p.toFixed(0) + '|昨收:' + PREV_CLOSE.toFixed(0) + ']→收复昨收，日内由空转多信号';
  }
  return '[价:' + p.toFixed(0) + '|量:' + (v/1e4).toFixed(1) + '万]→分钟级信号';
}

// ═══ 实时信号解释（含门限对比） ═══
function buildSigExplain(text, sub, icon, r) {
  var cur = (r.mins || []).length ? r.mins[r.mins.length - 1].price : 0;
  var PREV_CLOSE = CONFIG.prevClose || 1;

  if (text.indexOf('放量异动') === 0) {
    var m = r.mins[r.mins.length - 1];
    var histVols = r.mins.slice(Math.max(0, r.mins.length - 9), r.mins.length - 1).map(function(x){return x.vol;});
    var avg5 = histVols.length ? histVols.reduce(function(a,b){return a+b;},0) / histVols.length : 1;
    var ratio = avg5 > 0 ? (m.vol / avg5).toFixed(1) : '?';
    return '[量:' + (m.vol/1e4).toFixed(1) + '万|5分均量:' + (avg5/1e4).toFixed(1) + '万|倍率:' + ratio + '×(≥2倍门限)]→成交量显著异常，资金激烈博弈';
  }
  if (text.indexOf('诱多') === 0) {
    return '[判定:急拉后快速回吐]→价格冲高回落速度快，疑似主力拉升出货，警惕追高';
  }
  if (text.indexOf('严重超跌') === 0) {
    return '[价:' + cur.toFixed(0) + '|昨收:' + PREV_CLOSE.toFixed(0) + '|跌幅:≥7%]→恐慌性抛售后的超跌反弹概率上升，但抄底需等止跌信号';
  }
  if (text.indexOf('超跌预警') === 0) {
    return '[价:' + cur.toFixed(0) + '|昨收:' + PREV_CLOSE.toFixed(0) + '|跌幅:≥5%]→短期跌幅较大，卖压释放充分，关注是否有止跌反弹信号';
  }
  if (text.indexOf('反弹质量') === 0) {
    return sub ? ('[评分依据:' + sub + ']→A=量价配合佳,B=量弱涨幅尚可,C=缩量弱反弹') : '[关注反弹力度与量能配合]→量能不足的反弹易夭折';
  }
  if (text.indexOf('缩量止跌') === 0) {
    return '[判定:连续缩量下跌]→抛压衰竭信号，若持续缩量且价格企稳，反弹概率提升';
  }
  return sub || null;
}

// ═══ UI更新 ═══
function updateUI(r) {
  const PREV_CLOSE = CONFIG.prevClose || 1;

  document.getElementById('price').textContent = r.cur.toFixed(0);
  document.getElementById('price').style.color = r.chg >= 0 ? 'var(--red)' : 'var(--green)';
  const ce = document.getElementById('chg');
  ce.textContent = (r.chg >= 0 ? '+' : '') + r.chg.toFixed(1) + '%';
  ce.className = 'chg ' + (r.chg >= 0 ? 'up' : 'down');
  document.getElementById('openP').textContent = r.open.toFixed(0);
  document.getElementById('highP').textContent = r.high.toFixed(0);
  document.getElementById('lowP').textContent = r.low.toFixed(0);
  document.getElementById('vol').textContent = (r.vol/1e4).toFixed(1);
  document.getElementById('amt').textContent = (r.amt/1e8).toFixed(2);
  document.getElementById('prevCloseTxt').textContent = PREV_CLOSE.toFixed(0);
  const bd = document.getElementById('badge');
  const hdSig = r.chg >= 0 ? '🔴 上涨' : r.chg < -2 ? '🟢 下跌' : '🟡 微跌';
  const hdCls = r.chg >= 0 ? 'red' : r.chg < -2 ? 'green' : 'yellow';
  bd.textContent = hdSig; bd.className = 'badge ' + hdCls;

  const br = r.bullRatio;
  document.getElementById('bullDir').textContent = '⚔️ 多空力量（10分钟方向：' + r.dir + '）';
  document.getElementById('bearPct').textContent = ((1-br)*100).toFixed(0) + '%';
  document.getElementById('bullPct').textContent = (br*100).toFixed(0) + '%';
  document.getElementById('bearBar').style.width = ((1-br)*100).toFixed(0) + '%';
  document.getElementById('bullBar').style.width = (br*100).toFixed(0) + '%';
  document.getElementById('vwapTxt').textContent = r.vwap.toFixed(0) + ' | 现价' + (r.cur >= r.vwap ? '↑高于' : '↓低于') + 'VWAP';

  if (r.flow) {
    document.getElementById('buyAmt').textContent = (r.flow.buyA/1e8).toFixed(2) + '亿';
    document.getElementById('sellAmt').textContent = (r.flow.sellA/1e8).toFixed(2) + '亿';
    document.getElementById('buyPct').textContent = r.flow.buyPct.toFixed(1) + '%';
    document.getElementById('sellPct').textContent = r.flow.sellPct.toFixed(1) + '%';
    const ne = document.getElementById('netFlow');
    const net = r.flow.netA;
    ne.textContent = '净' + (net >= 0 ? '流入' : '流出') + ': ' + Math.abs(net/1e8).toFixed(2) + '亿';
    ne.style.background = net >= 0 ? '#3a1a1a' : '#1a3a2a';
    ne.style.color = net >= 0 ? 'var(--red)' : 'var(--green)';
    const fb = document.getElementById('flowBar');
    fb.style.width = r.flow.buyPct.toFixed(0) + '%';
    fb.style.background = 'linear-gradient(90deg, var(--red), var(--green))';
  }

  // sigList 已移至关键洞察栏

  let srData = CONFIG.defaultSR.filter(s => s.v > 0);
  if (srData.length < 2) {
    const pivot = (r.high + r.low + r.cur) / 3;
    srData = [
      {t:'R',l:'阻力2',v:Math.round(2*pivot - r.low)},
      {t:'R',l:'阻力1',v:Math.round(2*pivot - r.high)},
      {t:'S',l:'支撑1',v:Math.round(2*pivot - r.high)},
      {t:'S',l:'支撑2',v:Math.round(2*pivot - r.low)},
    ];
  }
  document.getElementById('srList').innerHTML = srData.map(s =>
    '<div class="sr-row ' + s.t + '"><span class="sr-tag ' + s.t.toLowerCase() + '">' + s.l + '</span><span style="font-weight:bold">' + s.v + '</span><span style="font-size:9px;color:var(--muted)">' + (r.cur > s.v && s.t==='R' ? '下方' : r.cur < s.v && s.t==='S' ? '上方' : '触及!') + '</span></div>'
  ).join('');

  // 关键洞察 + 实时信号合并栏
  var icHtml = '';

  // 实时信号卡片（优先显示，最多3条）
  if (r.sigs && r.sigs.length) {
    for (var si = 0; si < Math.min(r.sigs.length, 3); si++) {
      var sig = r.sigs[si];
      icHtml += '<div class="insight-card signal"><div class="ic-header"><span class="ic-icon">'+sig.icon+'</span><span class="ic-title">'+sig.text+'</span></div><div class="ic-desc">'+sig.sub+'</div></div>';
    }
  }

  // 关键洞察（限制总数不超过5张卡）
  var displayInsights = (r.insights && r.insights.length) ? r.insights : [];
  var maxInsight = Math.max(1, 5 - Math.min((r.sigs||[]).length, 3));
  displayInsights = displayInsights.slice(0, maxInsight);

  if (!displayInsights.length) {
    var chgDescFallback = r.chg > 2 ? '强势上涨中，注意高位风险' : r.chg > 0 ? '温和上涨，趋势健康' : r.chg > -2 ? '小幅回调，观察支撑' : r.chg > -5 ? '明显下跌，关注底部信号' : '大幅下挫，恐慌情绪蔓延';
    displayInsights = [{icon:'📋',title:'盘面综述',desc:chgDescFallback,type:'info'}];
  }
  icHtml += displayInsights.map(function(ins){
    var cdot = ins.conf === 'high' ? '<span class="conf-dot" style="color:#f85149">●</span>' : ins.conf === 'low' ? '<span class="conf-dot" style="color:#8b949e">●</span>' : '';
    return '<div class="insight-card '+ins.type+'"><div class="ic-header">'+cdot+'<span class="ic-icon">'+ins.icon+'</span><span class="ic-title">'+ins.title+'</span></div><div class="ic-desc">'+ins.desc+'</div></div>';
  }).join('');

  document.getElementById('insightBar').innerHTML = icHtml;

  const all = [...r.mins].reverse();
  document.getElementById('pulseBody').innerHTML = all.map((m, ri) => {
    const idx = r.mins.length - 1 - ri;
    const cg = (m.price - PREV_CLOSE) / PREV_CLOSE * 100;
    const cls = cg >= 0 ? 'up' : 'down';
    const tags = detectMinuteSignals(r, idx);
    const sigsHtml = tags.map(t => '<span class="tag ' + t.cls + '">' + t.label + '</span>').join(' ');
    return '<tr class="' + cls + '"><td>' + m.time + '</td><td style="font-weight:bold">' + m.price.toFixed(0) + '</td><td style="color:' + (cg>=0?'var(--red)':'var(--green)') + '">' + (cg>=0?'+':'') + cg.toFixed(1) + '%</td><td>' + (m.vol/1e4).toFixed(1) + '万</td><td>' + sigsHtml + '</td></tr>';
  }).join('');

  // ═══ 信号日志 ═══
  var logEntries = buildSignalLog(r);
  var logHtml = '';
  if (logEntries.length > 0) {
    for (var li = 0; li < logEntries.length; li++) {
      var le = logEntries[li];
      var explainText = le.explain;
      logHtml += '<div style="padding:3px 0;border-bottom:1px solid #21262d">';
      logHtml += '<span style="color:var(--muted)">' + (le.time || '--:--') + '</span> ';
      logHtml += '<span>' + le.icon + ' ' + le.signal + '</span>';
      logHtml += '<span style="color:var(--muted)">' + le.conf + '</span>';
      logHtml += '<span style="color:#8b949e">：' + explainText + '</span>';
      logHtml += '</div>';
    }
  } else {
    logHtml = '<div style="color:var(--muted);text-align:center;padding:8px">暂无信号</div>';
  }
  document.getElementById('signalLog').innerHTML = logHtml;

  if (chart && r.candles.length > 0) {

    if (chartMode === 'intra') {
    // ═══ 分时模式 ═══
    // ── 昨日蜡烛 + VWAP ──
    if (yesterdayCandleSeries) {
      if (r.yesterdayCandles && r.yesterdayCandles.length > 0) {
        yesterdayCandleSeries.setData(r.yesterdayCandles);
        if (yesterdayVwapLineSeries && r.yesterdayVwap && r.yesterdayVwap > 0 && r.yesterdayCandles.length >= 2) {
          var yc0 = r.yesterdayCandles[0], ycN = r.yesterdayCandles[r.yesterdayCandles.length - 1];
          yesterdayVwapLineSeries.setData([
            { time: yc0.time, value: r.yesterdayVwap },
            { time: ycN.time, value: r.yesterdayVwap }
          ]);
        } else if (yesterdayVwapLineSeries) {
          yesterdayVwapLineSeries.setData([]);
        }
      } else {
        yesterdayCandleSeries.setData([]);
        if (yesterdayVwapLineSeries) yesterdayVwapLineSeries.setData([]);
      }
    }

    candleSeries.setData(r.candles);
    volSeries.setData(r.candles.map(c => ({ time: c.time, value: c.volume, color: c.close >= c.open ? '#f8514944' : '#3fb95044' })));

    let cumV = 0, cumPV = 0;
    const vd = [];
    for (const c of r.candles) {
      cumV += c.volume; cumPV += (c.high + c.low + c.close) / 3 * c.volume;
      if (cumV > 0) vd.push({ time: c.time, value: cumPV / cumV });
    }
    vwapLineSeries.setData(vd);
    r.vwapData = vd;

    // 分时 MACD
    if (r.macdData && r.macdData.length > 0 && r.candles.length === r.macdData.length) {
      macdDifSeries.setData(r.candles.map(function(c, i){ return { time: c.time, value: r.macdData[i].dif }; }));
      macdDeaSeries.setData(r.candles.map(function(c, i){ return { time: c.time, value: r.macdData[i].dea }; }));
      macdHistSeries.setData(r.candles.map(function(c, i){
        var v = r.macdData[i].macd;
        return { time: c.time, value: v, color: v >= 0 ? 'rgba(248,81,73,0.6)' : 'rgba(63,185,80,0.6)' };
      }));

      var markers = [];
      if (r.macdDivergence && r.macdDivergence.length > 0) {
        for (var di = 0; di < r.macdDivergence.length; di++) {
          var dv = r.macdDivergence[di];
          if (dv.idx >= 0 && dv.idx < r.candles.length) {
            var c = r.candles[dv.idx];
            var isSkip = dv.level === 'skip';
            markers.push({
              time: c.time, position: dv.type === 'top' ? 'aboveBar' : 'belowBar',
              color: dv.type === 'top' ? '#3fb950' : '#f85149',
              shape: dv.type === 'top' ? 'arrowDown' : 'arrowUp',
              text: (isSkip ? '隔峰' : '') + (dv.type === 'top' ? '顶背' : '底背'),
              size: 'auto'
            });
          }
        }
      }
      candleSeries.setMarkers(markers.length > 0 ? markers : []);
    }

    // 隐藏 MA 均线
    ma5Series.setData([]); ma5Series.applyOptions({ visible: false });
    ma10Series.setData([]); ma10Series.applyOptions({ visible: false });
    ma20Series.setData([]); ma20Series.applyOptions({ visible: false });

    // 清除背驰段矩形
    if (segmentPrimitive) { try { chart.panes()[0].detachPrimitive(segmentPrimitive); } catch(e) {} segmentPrimitive = null; }

    for (const pl of priceLines) candleSeries.removePriceLine(pl);
    priceLines = [];
    priceLines.push(candleSeries.createPriceLine({ price: PREV_CLOSE, color: '#58a6ff', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '昨收' }));
    priceLines.push(candleSeries.createPriceLine({ price: r.open, color: '#8b949e', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: '今开' }));

    // 渲染洞察栏（分时）
    renderInsightBar(r.insights, r.sigs);

    } else if (chartMode === '5min') {
    // ═══ 5分钟K线模式 ═══
    if (yesterdayCandleSeries) yesterdayCandleSeries.setData([]);
    if (yesterdayVwapLineSeries) yesterdayVwapLineSeries.setData([]);
    vwapLineSeries.setData([]);
    for (const pl of priceLines) candleSeries.removePriceLine(pl);
    priceLines = [];
    ma5Series.setData([]); ma5Series.applyOptions({ visible: false });
    ma10Series.setData([]); ma10Series.applyOptions({ visible: false });
    ma20Series.setData([]); ma20Series.applyOptions({ visible: false });

    if (!fiveMinChartData || fiveMinChartData._minsLen !== r.mins.length) {
      fiveMinChartData = build5MinChartData(r.mins);
      if (fiveMinChartData) fiveMinChartData._minsLen = r.mins.length;
    }

    if (fiveMinChartData && fiveMinChartData.candles) {
      candleSeries.setData(fiveMinChartData.candles);
      volSeries.setData(fiveMinChartData.volumes);
      macdDifSeries.setData(fiveMinChartData.macdDifs);
      macdDeaSeries.setData(fiveMinChartData.macdDeas);
      macdHistSeries.setData(fiveMinChartData.macdHists);

      var m5Markers = [];
      if (fiveMinChartData.divergence && fiveMinChartData.divergence.length > 0) {
        for (var di = 0; di < fiveMinChartData.divergence.length; di++) {
          var dv = fiveMinChartData.divergence[di];
          if (dv.idx >= 0 && dv.idx < fiveMinChartData.candles.length) {
            var c = fiveMinChartData.candles[dv.idx];
            var isSkip = dv.level === 'skip';
            m5Markers.push({ time: c.time, position: dv.type === 'top' ? 'aboveBar' : 'belowBar',
              color: dv.type === 'top' ? '#3fb950' : '#f85149', shape: dv.type === 'top' ? 'arrowDown' : 'arrowUp',
              text: (isSkip ? '隔峰' : '') + (dv.type === 'top' ? '顶背' : '底背'), size: 'auto' });
          }
        }
      }
      candleSeries.setMarkers(m5Markers.length > 0 ? m5Markers : []);
      drawDivergenceSegments(chart, fiveMinChartData.segments, fiveMinChartData.candles);
    }

    if (fiveMinChartData && fiveMinChartData.insights) {
      document.getElementById('insightBar').innerHTML = fiveMinChartData.insights.map(function(ins){
        var cdot = ins.conf === 'high' ? '<span class="conf-dot" style="color:#f85149">●</span>' : ins.conf === 'low' ? '<span class="conf-dot" style="color:#8b949e">●</span>' : '';
        return '<div class="insight-card '+ins.type+'"><div class="ic-header">'+cdot+'<span class="ic-icon">'+ins.icon+'</span><span class="ic-title">'+ins.title+'</span></div><div class="ic-desc">'+ins.desc+'</div></div>';
      }).join('');
    }

    } else if (chartMode === 'daily') {
    // ═══ 日K模式 ═══
    // 隐藏昨日系列
    if (yesterdayCandleSeries) yesterdayCandleSeries.setData([]);
    if (yesterdayVwapLineSeries) yesterdayVwapLineSeries.setData([]);
    // 隐藏 VWAP
    vwapLineSeries.setData([]);
    // 清除参考线
    for (const pl of priceLines) candleSeries.removePriceLine(pl);
    priceLines = [];

    // 构建日线数据（如果尚未构建或dailyBars已更新）
    if (r.dailyBars && (!dailyChartData || dailyChartData._barsLen !== r.dailyBars.length)) {
      dailyChartData = buildDailyChartData(r.dailyBars);
      if (dailyChartData) dailyChartData._barsLen = r.dailyBars.length;
    }

    if (dailyChartData && dailyChartData.candles) {
      candleSeries.setData(dailyChartData.candles);
      volSeries.setData(dailyChartData.volumes);
      macdDifSeries.setData(dailyChartData.macdDifs);
      macdDeaSeries.setData(dailyChartData.macdDeas);
      macdHistSeries.setData(dailyChartData.macdHists);

      // MA 均线
      ma5Series.setData(dailyChartData.ma5Data || []); ma5Series.applyOptions({ visible: true });
      ma10Series.setData(dailyChartData.ma10Data || []); ma10Series.applyOptions({ visible: true });
      ma20Series.setData(dailyChartData.ma20Data || []); ma20Series.applyOptions({ visible: true });

      // 日线背驰标记
      var dMarkers = [];
      if (dailyChartData.divergence && dailyChartData.divergence.length > 0) {
        for (var di = 0; di < dailyChartData.divergence.length; di++) {
          var dv = dailyChartData.divergence[di];
          if (dv.idx >= 0 && dv.idx < dailyChartData.candles.length) {
            var dc = dailyChartData.candles[dv.idx];
            var isSkip = dv.level === 'skip';
            dMarkers.push({
              time: dc.time, position: dv.type === 'top' ? 'aboveBar' : 'belowBar',
              color: dv.type === 'top' ? '#3fb950' : '#f85149',
              shape: dv.type === 'top' ? 'arrowDown' : 'arrowUp',
              text: (isSkip ? '隔峰' : '') + (dv.type === 'top' ? '顶背' : '底背'),
              size: 'auto'
            });
          }
        }
      }
      // KDJ 超买超卖标记
      if (dailyChartData.kdjDaily) {
        for (var ki = 0; ki < dailyChartData.kdjDaily.length && ki < dailyChartData.candles.length; ki++) {
          var kd = dailyChartData.kdjDaily[ki];
          if (kd.j < 0) {
            dMarkers.push({ time: dailyChartData.candles[ki].time, position: 'belowBar', color: '#f85149', shape: 'circle', text: '超卖', size: 'auto' });
          } else if (kd.j > 100) {
            dMarkers.push({ time: dailyChartData.candles[ki].time, position: 'aboveBar', color: '#3fb950', shape: 'circle', text: '超买', size: 'auto' });
          }
        }
      }
      candleSeries.setMarkers(dMarkers.length > 0 ? dMarkers : []);
      drawDivergenceSegments(chart, dailyChartData.segments, dailyChartData.candles);
    }

    // 日线洞察卡片
    if (dailyChartData && dailyChartData.dailyInsights) {
      document.getElementById('insightBar').innerHTML = dailyChartData.dailyInsights.map(function(ins){
        var cdot = ins.conf === 'high' ? '<span class="conf-dot" style="color:#f85149">●</span>' : ins.conf === 'low' ? '<span class="conf-dot" style="color:#8b949e">●</span>' : '';
        return '<div class="insight-card '+ins.type+'"><div class="ic-header">'+cdot+'<span class="ic-icon">'+ins.icon+'</span><span class="ic-title">'+ins.title+'</span></div><div class="ic-desc">'+ins.desc+'</div></div>';
      }).join('');
    }
    }

    chart.timeScale().fitContent();
  }
}

// ═══ 告警 ═══
function loadAlerts() {
  try { return JSON.parse(localStorage.getItem(alertKey())) || []; } catch(e) { return []; }
}
function saveAlerts(alerts) {
  localStorage.setItem(alertKey(), JSON.stringify(alerts));
}
function renderAlerts(alerts) {
  document.getElementById('alertList').innerHTML = alerts.map((a, i) =>
    '<div class="alert-active"><span>' + (a.dir === '>' ? '📈 突破' : '📉 跌破') + ' ' + a.price + '</span><span class="del" onclick="delAlert(' + i + ')">✕</span></div>'
  ).join('');
}
function setAlert() {
  const inp = document.getElementById('alertPrice');
  const val = parseFloat(inp.value);
  if (!val || val <= 0) return toast('请输入有效价格', 'alert');
  const alerts = loadAlerts();
  const curPrice = parseFloat(document.getElementById('price').textContent) || 0;
  const dir = val > curPrice ? '>' : '<';
  alerts.push({ price: val, dir, triggered: false });
  saveAlerts(alerts); renderAlerts(alerts);
  inp.value = '';
  toast('告警已设置: ' + (dir === '>' ? '突破' : '跌破') + ' ' + val, 'alert');
}
function delAlert(idx) {
  const alerts = loadAlerts(); alerts.splice(idx, 1);
  saveAlerts(alerts); renderAlerts(alerts);
}
function checkAlerts(curPrice) {
  const alerts = loadAlerts();
  let changed = false;
  for (const a of alerts) {
    if (a.triggered) continue;
    if ((a.dir === '>' && curPrice >= a.price) || (a.dir === '<' && curPrice <= a.price)) {
      a.triggered = true; changed = true;
      toast('🚨 ' + CONFIG.name + ' 告警触发: ' + (a.dir === '>' ? '突破' : '跌破') + ' ' + a.price + '! (现价:' + curPrice + ')', 'alert');
      try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f38=').play(); } catch(e) {}
    }
  }
  if (changed) { saveAlerts(alerts); renderAlerts(alerts); }
}

// ═══ 主刷新 ═══
async function refresh() {
  const btn = document.getElementById('btn');
  btn.classList.add('loading'); btn.textContent = '⏳';

  try {
    if (!cachedData) cachedData = loadCache();

    const { q, trends, dailyBars } = await fetchData();

    // 收盘后：有报价但无分钟数据，仍显示基础信息
    if (!q) {
      showErr('数据获取失败，请检查网络或稍后重试');
      btn.classList.remove('loading'); btn.textContent = '🔄 刷新';
      return;
    }

    if (!trends.length) {
      // 无分钟数据（收盘/节假日），显示静态报价
      var ps2 = CONFIG.priceScale || 1000;
      var cur = q.f43 / ps2, openP = q.f46 / ps2, highP = q.f44 / ps2, lowP = q.f45 / ps2;
      var prevCl = q.f60 ? q.f60 / ps2 : (CONFIG.prevClose || 1);
      if (q.f60) CONFIG.prevClose = q.f60 / ps2;
      var closedChg = (cur - prevCl) / prevCl * 100;
      document.getElementById('price').textContent = cur.toFixed(0);
      document.getElementById('price').style.color = closedChg >= 0 ? 'var(--red)' : 'var(--green)';
      var ce2 = document.getElementById('chg');
      ce2.textContent = (closedChg >= 0 ? '+' : '') + closedChg.toFixed(1) + '%';
      ce2.className = 'chg ' + (closedChg >= 0 ? 'up' : 'down');
      document.getElementById('openP').textContent = openP.toFixed(0);
      document.getElementById('highP').textContent = highP.toFixed(0);
      document.getElementById('lowP').textContent = lowP.toFixed(0);
      document.getElementById('vol').textContent = '--';
      document.getElementById('amt').textContent = '--';
      var bd2 = document.getElementById('badge');
      var hd2 = closedChg >= 0 ? '🔴 上涨' : closedChg < -2 ? '🟢 下跌' : '🟡 微跌';
      bd2.textContent = '⚫ 已收盘 | ' + hd2;
      bd2.className = 'badge gray';
      document.getElementById('tradeStatus').textContent = '已收盘';
      document.getElementById('tradeStatus').className = 'trading-status closed';
      document.getElementById('sigList').innerHTML = '<div style="color:var(--muted);font-size:11px">已收盘，无实时信号</div>';
      document.getElementById('insightBar').innerHTML = '<div class="insight-card info"><div class="ic-header"><span class="ic-icon">🌙</span><span class="ic-title">已收盘</span></div><div class="ic-desc">今日收盘 ' + cur.toFixed(0) + '（' + (closedChg >= 0 ? '+' : '') + closedChg.toFixed(1) + '%），等待下一交易日开盘</div></div>';
      document.getElementById('pulseBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">⏸ 已收盘，开盘后将恢复实时数据</td></tr>';
      document.getElementById('signalLog').innerHTML = '<div style="color:var(--muted);text-align:center;padding:8px">⏸ 已收盘</div>';
      document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');
      document.getElementById('cacheInfo').textContent = '（已收盘）';
      document.getElementById('chartMsg').style.display = 'block';
      document.getElementById('chartMsg').textContent = '🌙 已收盘';
      if (chart) {
        candleSeries.setData([]);
        vwapLineSeries.setData([]);
        volSeries.setData([]);
        macdDifSeries.setData([]);
        macdDeaSeries.setData([]);
        macdHistSeries.setData([]);
        ma5Series.setData([]); ma5Series.applyOptions({ visible: false });
        ma10Series.setData([]); ma10Series.applyOptions({ visible: false });
        ma20Series.setData([]); ma20Series.applyOptions({ visible: false });
        candleSeries.setMarkers([]);
        chartMode = 'intra';
        document.getElementById('tabIntra').className = 'tab active';
        document.getElementById('tab5Min').className = 'tab';
        document.getElementById('tabDaily').className = 'tab';
      }
      btn.classList.remove('loading'); btn.textContent = '🔄 刷新';
      return;
    }

    const result = analyze(q, trends, dailyBars);
    cachedData = result;
    saveCache(result);
    updateUI(result);

    // 存入今日数据，次日自动作为「昨天」显示
    var todayDateStr = TODAY_UTC.Y + '-' + String(TODAY_UTC.M + 1).padStart(2,'0') + '-' + String(TODAY_UTC.D).padStart(2,'0');
    if (result.candles && result.candles.length > 0) {
      saveDayHistory(CONFIG.code, todayDateStr, result);
    }

    checkAlerts(result.cur);

    const ts = document.getElementById('tradeStatus');
    if (!CONFIG.isTrading && result.chg === 0 && result.vol < 100) {
      ts.textContent = '已收盘'; ts.className = 'trading-status closed';
    } else {
      ts.textContent = '交易中'; ts.className = 'trading-status live';
    }

    document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');
    document.getElementById('cacheInfo').textContent = '';
  } catch(e) {
    console.error(e);
    if (cachedData) { updateUI(cachedData); document.getElementById('cacheInfo').textContent = '（使用缓存）'; }
    else showErr('数据获取失败: ' + (e.message || '网络错误'));
  }

  btn.classList.remove('loading'); btn.textContent = '🔄 刷新';
}

// ═══ 启动 ═══
window.addEventListener('DOMContentLoaded', async () => {
  computeTodayUTC();

  const ts = document.getElementById('tradeStatus');
  ts.className = 'trading-status ' + (CONFIG.isTrading ? 'live' : 'closed');

  // 确保模板股票在自选列表中
  const wl = loadWatchlist();
  if (!wl.find(s => s.code === CONFIG.code)) {
    wl.unshift({ code: CONFIG.code, name: CONFIG.name, secid: CONFIG.secid, market: CONFIG.market, prevClose: CONFIG.prevClose });
    saveWatchlist(wl);
  }
  renderWatchlist();

  renderAlerts(loadAlerts());

  if (initChart()) {
    // prevClose 始终从 API 获取，不使用硬编码值
    await switchStock(CONFIG.secid, CONFIG.code, CONFIG.name, CONFIG.market, 0);
    cachedData = loadCache();
    if (cachedData) {
      updateUI(cachedData);
      document.getElementById('cacheInfo').textContent = '（缓存）';
    }
    refresh();
    if (CONFIG.isTrading) updateTimer = setInterval(refresh, 5 * 60 * 1000);
    alertCheckTimer = setInterval(() => { if (cachedData) checkAlerts(cachedData.cur); }, 30000);
  }
});

window.addEventListener('resize', () => {
  if (chart) chart.applyOptions({ width: document.getElementById('chartContainer').clientWidth });
});
</script>
